momo.partnerCode=MOMO
momo.accessKey=klm05TvNBzhg7h7j
momo.secretKey=at67qH6mk8w5Y1nAyMoYKMWACiEi2bsa
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.returnUrl=http://localhost:3000/payment/success
# 🔥 IMPORTANT: Update this with your ngrok URL for local testing
# Example: https://abc123.ngrok.io/api/v1/payments/momo/ipn
momo.ipnUrl=https://webhook.site/unique-id-here

# Email Configuration (for Payment Notifications)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App Configuration
app.name=CycleMart